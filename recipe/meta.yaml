{% set version = "0.7.0" %}
{% set python_min = "3.12" %}

package:
  name: napari-phasors
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/n/napari-phasors/napari_phasors-{{ version }}.tar.gz
  sha256: 6bfbf934682bf96dd718bf5bb8ac9a316dd6fd1d7af8f2551e17e4f653b12fcc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42.0.0
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - phasorpy >=0.10
    - qtpy
    - pyqt6
    - biaplotter >=0.4.2
    - fbdfile
    - sdtfile
    - ptufile
    - tifffile
    - pandas
    - pawflim
    - scipy
    - czifile
    - lfdfiles

test:
  commands:
    # A plain ``import napari_phasors`` pulls in napari -> vispy, whose OpenGL
    # (GL ES 2.0) backend cannot load on the headless build agents. We
    # validate the environment with ``pip check`` instead of an import test.
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/napari-phasors/napari-phasors
  summary: A simple plugin to use phasor analysis
  doc_url: https://github.com/napari-phasors/napari-phasors
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - bruno-pannunzio
